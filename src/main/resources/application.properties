spring.application.name=climalert

# String de Crong para el procesamiento de emails (cada 1 minuto)
cron.expression=0 * * * * *

# WeatherAPI Configuration
weather.api.key=API-KEY-EXAMPLE
weather.api.base-url=http://api.weatherapi.com/v1
# Ubicacion fija que monitorea el sistema (debe ser un valor que WeatherAPI resuelva,
# ej: "CABA", "Buenos Aires", "Ciudad Autonoma de Buenos Aires,Argentina")
weather.location=CABA

# Email Configuration
email.alertas.remitente=alertas@clima.com
email.alertas.destinatarios=admin@clima.com,emergencias@clima.com,meteorologia@clima.com

# SMTP Configuration (usado por el adapter que efectivamente envia los correos)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:tu_correo@gmail.com}
spring.mail.password=${MAIL_PASSWORD:tu_password_de_aplicacion}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
